<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#C8FF00" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <text x="16" y="22" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#C8FF00" text-anchor="middle" filter="url(#glow)">MH</text>
</svg>
